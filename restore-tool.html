function log(msg,cls){
  var el=document.getElementById('log');
  el.innerHTML+='\n'+(cls?'<span class="'+cls+'">'+msg+'</span>':msg);
}
function summarise(name,d){
  if(!d){log(name+': EMPTY - nothing stored','warn');return;}
  var fx=d.fixture?Object.keys(d.fixture).length:0;
  var results=0;
  if(d.fixture)Object.keys(d.fixture).forEach(function(k){if(d.fixture[k]&&d.fixture[k].result)results++;});
  var vt=d.votes?Object.keys(d.votes).length:0;
  log(name+': '+fx+' fixture rounds, '+results+' with results, votes for '+vt+' rounds');
}
function checkCurrent(){
  log('Checking current database contents...');
  Promise.all([
    db.ref('wallabies').once('value'),
    db.ref('u12b').once('value')
  ]).then(function(snaps){
    summarise('Wallabies (current)',snaps[0].val());
    summarise('U12B (current)',snaps[1].val());
    log('Backup ready to restore:');
    summarise('Wallabies (backup)',WALLABIES_BACKUP);
    summarise('U12B (backup)',U12B_BACKUP);
  }).catch(function(e){log('Check failed: '+e.message,'err');});
}
function restoreAll(){
  if(!confirm('Restore Wallabies + U12B data from backup?\n\nThis OVERWRITES whatever is currently stored for those two teams with the backup (results to R9, votes to R8, new FV fixture).\n\nKangaroos data is NOT touched.'))return;
  log('Restoring Wallabies...');
  db.ref('wallabies').set(WALLABIES_BACKUP).then(function(){
    log('Wallabies restored.','ok');
    log('Restoring U12B...');
    return db.ref('u12b').set(U12B_BACKUP);
  }).then(function(){
    log('U12B restored.','ok');
    log('Verifying...');
    return Promise.all([db.ref('wallabies').once('value'),db.ref('u12b').once('value')]);
  }).then(function(snaps){
    summarise('Wallabies (verified)',snaps[0].val());
    summarise('U12B (verified)',snaps[1].val());
    log('DONE. Open both apps and confirm data is showing, then DELETE this file from GitHub.','ok');
  }).catch(function(e){log('RESTORE FAILED: '+e.message,'err');});
}
